<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>立体俄罗斯 · 炸弹/冻结 · 渐快加速(3000分一级) · 可开关音效</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #2b3a4a 0%, #1d2a35 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        .game-container {
            background: #27343f;
            border-radius: 2.5rem;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.6), inset 2px 2px 5px rgba(255, 255, 255, 0.1), inset -3px -3px 8px rgba(0, 0, 0, 0.5);
            padding: 2rem 2rem 2rem 2rem;
            display: flex;
            gap: 2.5rem;
            flex-wrap: wrap;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* 左侧游戏区 */
        .play-area {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #gameCanvas {
            display: block;
            width: 300px;
            height: 600px;
            border-radius: 24px;
            background: #10171e;
            box-shadow: inset 0 0 0 2px #3f4d5a, inset 0 0 15px #000000, 10px 10px 20px rgba(0, 0, 0, 0.6);
            image-rendering: crisp-edges;
            tab-index: 0;
            outline: none;
        }

        #gameCanvas:focus {
            outline: none;
        }

        .canvas-label {
            margin-top: 12px;
            color: #bdd1de;
            font-weight: 500;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0 #0f1a22;
            background: #1f2c36;
            padding: 6px 20px;
            border-radius: 40px;
            box-shadow: inset 1px 1px 3px #2e3f4b, inset -2px -2px 3px #0e151d;
        }

        /* 右侧设置区 */
        .settings-panel {
            background: #1f2c35;
            border-radius: 2rem;
            padding: 1.8rem 1.5rem;
            width: 260px;
            box-shadow: inset 1px 1px 4px rgba(255, 255, 255, 0.08), inset -3px -3px 8px rgba(0, 0, 0, 0.7), 8px 8px 18px black;
            border: 1px solid #384b57;
            color: #eaf0f5;
            display: flex;
            flex-direction: column;
            gap: 1.7rem;
        }

        .next-piece {
            background: #17212a;
            border-radius: 1.5rem;
            padding: 1rem 0.8rem;
            text-align: center;
            box-shadow: inset 0 0 0 2px #2c3d48, inset 0 0 10px #000000;
        }

        .next-piece h3 {
            margin: 0 0 12px 0;
            font-weight: 400;
            text-transform: uppercase;
            font-size: 1rem;
            letter-spacing: 3px;
            color: #9cb6cc;
        }

        #nextCanvas {
            display: block;
            width: 120px;
            height: 120px;
            margin: 0 auto;
            background: #0f171f;
            border-radius: 20px;
            box-shadow: inset 0 0 0 2px #3a4d59, 0 8px 0 #0a1116;
            image-rendering: crisp-edges;
        }

        .score-box {
            background: #101b23;
            border-radius: 40px;
            padding: 0.7rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 1.6rem;
            color: #f5d98f;
            text-shadow: 0 3px 0 #6f4f1a;
            box-shadow: inset 1px 1px 5px #31424e, inset -2px -2px 5px #03080c, 0 6px 0 #0a1219;
        }

        .score-box span {
            font-size: 1rem;
            color: #d3e3ed;
            text-shadow: none;
        }

        /* 速度控制 */
        .speed-section {
            background: #15212a;
            border-radius: 1.5rem;
            padding: 1rem 1rem 1.3rem;
            box-shadow: inset 0 1px 4px #30434f, inset -2px -2px 4px #0b131b;
        }

        .speed-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 10px 0;
        }

        .speed-option label {
            color: #b6d0df;
        }

        .speed-option input[type="radio"] {
            accent-color: #f5b342;
            width: 18px;
            height: 18px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        .slider-container input {
            flex: 1;
            height: 6px;
            border-radius: 10px;
            background: #2b3f4d;
            -webkit-appearance: none;
        }

        .slider-container input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #f0cf91;
            border-radius: 50%;
            box-shadow: 0 2px 6px black;
            border: 2px solid #ffe7b0;
            cursor: pointer;
        }

        #speedValue {
            min-width: 45px;
            text-align: center;
            background: #0e1922;
            padding: 5px 0;
            border-radius: 30px;
            font-weight: 600;
        }

        /* 声音开关 */
        .sound-toggle {
            background: #17242e;
            border-radius: 1.5rem;
            padding: 0.8rem 1rem 1.2rem;
        }
        .sound-toggle label {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #b0c9da;
            font-size: 1.1rem;
            cursor: pointer;
        }
        .sound-toggle input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #f5b342;
        }

        /* 样式选择器 */
        .style-selector {
            background: #17242e;
            border-radius: 1.5rem;
            padding: 0.8rem 1rem 1.2rem;
        }

        .style-selector h4 {
            margin: 0 0 8px 5px;
            font-weight: 400;
            color: #acc4d4;
        }

        #styleSelect {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            background: #253a47;
            color: white;
            font-weight: 500;
            border: none;
            outline: 1px solid #4b6879;
            box-shadow: inset 1px 1px 5px #0b151d;
            font-size: 1rem;
            cursor: pointer;
        }

        #styleSelect option {
            background: #1d2f3b;
        }

        .btn-new {
            background: #cf9f4b;
            border: none;
            padding: 14px 0;
            font-size: 1.4rem;
            font-weight: bold;
            color: #1f2b33;
            border-radius: 60px;
            box-shadow: 0 9px 0 #7a572b, 0 6px 15px black;
            cursor: pointer;
            transition: 0.07s;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .btn-new:active {
            transform: translateY(6px);
            box-shadow: 0 3px 0 #7a572b, 0 6px 15px black;
        }

        .footer-hint {
            color: #6d8a9c;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 5px;
        }
    </style>
</head>
<body>
<div class="game-container">
    <!-- 左侧主游戏区 -->
    <div class="play-area">
        <canvas id="gameCanvas" width="300" height="600" tabindex="0"></canvas>
        <div class="canvas-label">💣❄️ 炸弹/冻结 · 每1000分</div>
    </div>

    <!-- 右侧设置区 -->
    <div class="settings-panel">
        <div class="next-piece">
            <h3>▶ 下一个</h3>
            <canvas id="nextCanvas" width="120" height="120"></canvas>
        </div>

        <div class="score-box">
            <span>💯 积分</span>
            <span id="scoreDisplay">0</span>
        </div>

        <div class="speed-section">
            <div class="speed-option">
                <label>⚡ 固定速度</label>
                <input type="radio" name="speedMode" id="fixedMode">
            </div>
            <div class="speed-option">
                <label>📈 渐快加速</label>
                <input type="radio" name="speedMode" id="accelMode" checked>
            </div>

            <div class="slider-container">
                <span>🐢</span>
                <input type="range" id="speedSlider" min="50" max="500" value="500" step="10">
                <span id="speedValue">500ms</span>
            </div>
            <div style="font-size:0.85rem; color:#b0c9da; margin-top:8px; text-align:center;">
                ⏱️ 当前间隔 <span id="currentIntervalShow">500</span>ms
            </div>
        </div>

        <!-- 声音开关 -->
        <div class="sound-toggle">
            <label>
                <input type="checkbox" id="soundToggle" checked> 🔊 音效
            </label>
        </div>

        <div class="style-selector">
            <h4>🎨 方块样式 (10种)</h4>
            <select id="styleSelect">
                <option value="0">🧱 砖块</option>
                <option value="1">⚙️ 金属</option>
                <option value="2">🪵 橡木</option>
                <option value="3">💎 宝石蓝</option>
                <option value="4">🔥 熔岩</option>
                <option value="5">❄️ 冰晶</option>
                <option value="6">🍂 落叶</option>
                <option value="7">🪨 石板</option>
                <option value="8">🍬 糖果</option>
                <option value="9">☄️ 陨铁</option>
            </select>
        </div>

        <button class="btn-new" id="startGameBtn">▶ 开始游戏</button>
        <div class="footer-hint">💣 炸弹清屏 | ❄️ 冻结5个方块 (自动下落暂停)</div>
    </div>
</div>

<script>
    (function() {
        // ---------- 配置 ----------
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;    // 主画布格子尺寸
        const PREVIEW_SIZE = 24;   // 预览区域格子尺寸

        // 获取画布
        const gameCanvas = document.getElementById('gameCanvas');
        const ctx = gameCanvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');

        // 显示元素
        const scoreSpan = document.getElementById('scoreDisplay');
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');
        const fixedMode = document.getElementById('fixedMode');
        const accelMode = document.getElementById('accelMode');
        const styleSelect = document.getElementById('styleSelect');
        const startGameBtn = document.getElementById('startGameBtn');
        const currentIntervalShow = document.getElementById('currentIntervalShow');
        const soundToggle = document.getElementById('soundToggle');

        // 音效开关变量
        let soundEnabled = true;
        soundToggle.addEventListener('change', (e) => {
            soundEnabled = e.target.checked;
        });

        // ---------- 音效系统 (Web Audio API) ----------
        let audioCtx = null;

        function initAudio() {
            if (audioCtx) return audioCtx;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            } catch (e) {
                console.warn('Web Audio API not supported');
            }
            return audioCtx;
        }

        function playMoveSound() {
            if (!soundEnabled || !audioCtx || audioCtx.state !== 'running') return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 300;
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + 0.05);
        }

        function playRotateSound() {
            if (!soundEnabled || !audioCtx || audioCtx.state !== 'running') return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 450;
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + 0.06);
        }

        function playLandSound() {
            if (!soundEnabled || !audioCtx || audioCtx.state !== 'running') return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.value = 180;
            gain.gain.setValueAtTime(0.12, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + 0.08);
        }

        function playClearSound() {
            if (!soundEnabled || !audioCtx || audioCtx.state !== 'running') return;
            const now = audioCtx.currentTime;
            [400, 550].forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.08, now + i*0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, now + i*0.02 + 0.1);
                osc.connect(gain).connect(audioCtx.destination);
                osc.start(now + i*0.02);
                osc.stop(now + i*0.02 + 0.1);
            });
        }

        function playBombSound() {
            if (!soundEnabled || !audioCtx || audioCtx.state !== 'running') return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.value = 120;
            gain.gain.setValueAtTime(0.25, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + 0.5);

            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'square';
            osc2.frequency.value = 60;
            gain2.gain.setValueAtTime(0.15, now);
            gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
            osc2.connect(gain2).connect(audioCtx.destination);
            osc2.start(now);
            osc2.stop(now + 0.5);
        }

        function playGameOverSound() {
            if (!soundEnabled || !audioCtx || audioCtx.state !== 'running') return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.exponentialRampToValueAtTime(200, now + 0.6);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + 0.8);
        }

        // 冻结音效
        function playFreezeSound() {
            if (!soundEnabled || !audioCtx || audioCtx.state !== 'running') return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 220;
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + 0.3);
        }

        // ---------- 游戏状态 ----------
        let grid = [];                 // 占用布尔 true=有方块
        let bombGrid = [];             // 炸弹标志 true=炸弹
        let freezeGrid = [];           // 冻结标志 true=冻结
        let score = 0;

        // 当前活动方块
        let currentPiece = null;        // { shape, x, y, isBomb, isFreeze }
        let nextPiece = null;
        let nextIsBomb = false;
        let nextIsFreeze = false;

        // 特殊方块阈值 (每1000分出现炸弹或冻结)
        let specialThreshold = 1000;
        let nextSpecialType = 0;           // 0=普通, 1=炸弹, 2=冻结

        // 冻结状态
        let freezeActive = false;          // 是否处于冻结期
        let freezeCount = 0;               // 剩余冻结方块数量

        // 游戏循环控制
        let gameInterval = null;
        let gameActive = false;
        let gameOver = false;

        // 速度参数 (ms) 默认500
        let baseInterval = 500;
        let currentInterval = 500;

        // 标准方块形状 (经典7种)
        const SHAPES = [
            {   // I
                matrix: [[1,1,1,1]],
                color: '#00f0f0'
            },
            {   // O
                matrix: [[1,1],[1,1]],
                color: '#f0f000'
            },
            {   // T
                matrix: [[0,1,0],[1,1,1]],
                color: '#c0a0f0'
            },
            {   // S
                matrix: [[0,1,1],[1,1,0]],
                color: '#60f060'
            },
            {   // Z
                matrix: [[1,1,0],[0,1,1]],
                color: '#f06060'
            },
            {   // J
                matrix: [[1,0,0],[1,1,1]],
                color: '#6060f0'
            },
            {   // L
                matrix: [[0,0,1],[1,1,1]],
                color: '#f0a060'
            }
        ];

        // 当前样式索引 (0-9)
        let currentStyle = 0;

        // ---------- 辅助函数 ----------
        function initGrid() {
            grid = Array(ROWS).fill().map(() => Array(COLS).fill(false));
            bombGrid = Array(ROWS).fill().map(() => Array(COLS).fill(false));
            freezeGrid = Array(ROWS).fill().map(() => Array(COLS).fill(false));
        }

        // 随机生成一个方块 (根据指定的特殊类型)
        function createRandomPiece(type = 0) { // 0普通 1炸弹 2冻结
            const rand = Math.floor(Math.random() * SHAPES.length);
            const shape = SHAPES[rand].matrix.map(row => [...row]);
            return {
                shape: shape,
                x: Math.floor((COLS - shape[0].length) / 2),
                y: 0,
                isBomb: type === 1,
                isFreeze: type === 2
            };
        }

        // 生成下一个方块（根据nextSpecialType）
        function generateNextPiece() {
            if (nextSpecialType !== 0) {
                nextPiece = createRandomPiece(nextSpecialType);
                nextIsBomb = (nextSpecialType === 1);
                nextIsFreeze = (nextSpecialType === 2);
                nextSpecialType = 0;
            } else {
                nextPiece = createRandomPiece(0);
                nextIsBomb = false;
                nextIsFreeze = false;
            }
        }

        // 检查并触发特殊阈值
        function checkSpecialThreshold() {
            while (score >= specialThreshold) {
                nextSpecialType = Math.random() < 0.5 ? 1 : 2;
                specialThreshold += 1000;
            }
        }

        function spawnNewPiece() {
            if (!nextPiece) {
                generateNextPiece();
            }
            currentPiece = {
                shape: nextPiece.shape.map(row => [...row]),
                x: nextPiece.x,
                y: nextPiece.y,
                isBomb: nextIsBomb,
                isFreeze: nextIsFreeze
            };

            generateNextPiece();

            // 处理冻结计数
            if (freezeActive) {
                if (freezeCount > 0) {
                    freezeCount--;
                    if (freezeCount === 0) {
                        freezeActive = false;
                    }
                }
            }

            if (collision(currentPiece.shape, currentPiece.x, currentPiece.y)) {
                gameActive = false;
                gameOver = true;
                if (gameInterval) {
                    clearInterval(gameInterval);
                    gameInterval = null;
                }
                playGameOverSound();
            }
            drawAll();
        }

        function collision(shape, offsetX, offsetY) {
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[0].length; c++) {
                    if (shape[r][c] !== 0) {
                        const boardX = offsetX + c;
                        const boardY = offsetY + r;
                        if (boardX < 0 || boardX >= COLS || boardY >= ROWS || boardY < 0) return true;
                        if (boardY >= 0 && grid[boardY][boardX]) return true;
                    }
                }
            }
            return false;
        }

        function lockPiece() {
            if (!currentPiece) return;

            for (let r = 0; r < currentPiece.shape.length; r++) {
                for (let c = 0; c < currentPiece.shape[0].length; c++) {
                    if (currentPiece.shape[r][c]) {
                        const boardY = currentPiece.y + r;
                        const boardX = currentPiece.x + c;
                        if (boardY >= 0 && boardY < ROWS && boardX >= 0 && boardX < COLS) {
                            grid[boardY][boardX] = true;
                            bombGrid[boardY][boardX] = currentPiece.isBomb;
                            freezeGrid[boardY][boardX] = currentPiece.isFreeze;
                        }
                    }
                }
            }

            playLandSound();

            clearFullRows();

            spawnNewPiece();
            drawAll();
            adjustSpeedByMode();
        }

        function clearFullRows() {
            let rowsCleared = 0;
            let bombPresent = false;
            let freezePresent = false;

            for (let row = ROWS - 1; row >= 0; ) {
                if (grid[row].every(cell => cell === true)) {
                    for (let col = 0; col < COLS; col++) {
                        if (bombGrid[row][col]) bombPresent = true;
                        if (freezeGrid[row][col]) freezePresent = true;
                    }
                    for (let r = row; r > 0; r--) {
                        grid[r] = [...grid[r-1]];
                        bombGrid[r] = [...bombGrid[r-1]];
                        freezeGrid[r] = [...freezeGrid[r-1]];
                    }
                    grid[0] = Array(COLS).fill(false);
                    bombGrid[0] = Array(COLS).fill(false);
                    freezeGrid[0] = Array(COLS).fill(false);
                    rowsCleared++;
                } else {
                    row--;
                }
            }

            if (rowsCleared > 0) {
                score += rowsCleared === 1 ? 100 : rowsCleared === 2 ? 300 : rowsCleared === 3 ? 600 : 1000;
                updateScore();
                playClearSound();
            }

            if (bombPresent) {
                bombAllBlocks();
            } else if (freezePresent) {
                freezeActive = true;
                freezeCount = 5;
                playFreezeSound();
                drawAll();
            }
        }

        function bombAllBlocks() {
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    grid[row][col] = false;
                    bombGrid[row][col] = false;
                    freezeGrid[row][col] = false;
                }
            }
            score += 500;
            updateScore();
            playBombSound();

            if (gameActive && !gameOver) {
                currentPiece = null;
                spawnNewPiece();
            }
            drawAll();
        }

        function movePiece(dx, dy, playSound = false) {
            if (!currentPiece || !gameActive || gameOver) return false;
            const newX = currentPiece.x + dx;
            const newY = currentPiece.y + dy;
            if (!collision(currentPiece.shape, newX, newY)) {
                currentPiece.x = newX;
                currentPiece.y = newY;
                drawAll();
                if (playSound) playMoveSound();
                return true;
            }
            if (dy === 1) {
                lockPiece();
                drawAll();
            }
            return false;
        }

        function rotatePiece() {
            if (!currentPiece || !gameActive || gameOver) return;
            const oldShape = currentPiece.shape;
            const rotated = oldShape[0].map((_, idx) => oldShape.map(row => row[idx]).reverse());
            if (!collision(rotated, currentPiece.x, currentPiece.y)) {
                currentPiece.shape = rotated;
                playRotateSound();
            } else {
                if (!collision(rotated, currentPiece.x + 1, currentPiece.y)) {
                    currentPiece.shape = rotated;
                    currentPiece.x += 1;
                    playRotateSound();
                } else if (!collision(rotated, currentPiece.x - 1, currentPiece.y)) {
                    currentPiece.shape = rotated;
                    currentPiece.x -= 1;
                    playRotateSound();
                }
            }
            drawAll();
        }

        function drawAll() {
            drawGameBoard();
            drawNextBoard();
        }

        function drawBlock(ctx, x, y, size, isBomb, isFreeze, styleIndex) {
            const grd = ctx.createLinearGradient(x, y, x + size, y + size);
            let baseColor1, baseColor2, patternLines = false;
            switch (styleIndex) {
                case 0: baseColor1='#b85e3a', baseColor2='#8b3e21', patternLines=true; break;
                case 1: baseColor1='#a0b8c9', baseColor2='#6f879b', patternLines=false; break;
                case 2: baseColor1='#9c7c5b', baseColor2='#6b4f38', patternLines=true; break;
                case 3: baseColor1='#3a7ca5', baseColor2='#1f4b6e', patternLines=false; break;
                case 4: baseColor1='#d93f21', baseColor2='#a32f15', patternLines=true; break;
                case 5: baseColor1='#9fd9f2', baseColor2='#63a5c7', patternLines=false; break;
                case 6: baseColor1='#a58d4f', baseColor2='#766831', patternLines=true; break;
                case 7: baseColor1='#7a7f8c', baseColor2='#4f535e', patternLines=false; break;
                case 8: baseColor1='#f2a0c0', baseColor2='#d16b97', patternLines=true; break;
                case 9: baseColor1='#5d6b7a', baseColor2='#333e4a', patternLines=false; break;
                default: baseColor1='#aaa', baseColor2='#777';
            }
            grd.addColorStop(0, baseColor1);
            grd.addColorStop(1, baseColor2);
            ctx.fillStyle = grd;
            ctx.fillRect(x, y, size, size);

            ctx.strokeStyle = 'rgba(255,255,255,0.35)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x, y+size); ctx.lineTo(x, y); ctx.lineTo(x+size, y);
            ctx.stroke();
            ctx.strokeStyle = 'rgba(0,0,0,0.45)';
            ctx.beginPath();
            ctx.moveTo(x+size, y); ctx.lineTo(x+size, y+size); ctx.lineTo(x, y+size);
            ctx.stroke();

            if (patternLines && styleIndex !== 1 && styleIndex !== 3 && styleIndex !== 5 && styleIndex !== 7 && styleIndex !== 9) {
                ctx.strokeStyle = '#00000030';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(x+4, y+size-6); ctx.lineTo(x+size-4, y+6);
                ctx.stroke();
            }

            if (isBomb) {
                ctx.font = `bold ${size-6}px "Segoe UI", "Arial Unicode MS", sans-serif`;
                ctx.fillStyle = '#111';
                ctx.fillText('💣', x+4, y+size-6);
                ctx.fillStyle = 'white';
                ctx.fillText('💣', x+2, y+size-8);
            } else if (isFreeze) {
                ctx.font = `bold ${size-6}px "Segoe UI", "Arial Unicode MS", sans-serif`;
                ctx.fillStyle = '#aaccff';
                ctx.fillText('❄️', x+4, y+size-6);
                ctx.fillStyle = '#ffffff';
                ctx.fillText('❄️', x+2, y+size-8);
            }
        }

        function drawGameBoard() {
            ctx.clearRect(0, 0, 300, 600);
            ctx.fillStyle = '#0f1a21';
            ctx.fillRect(0, 0, 300, 600);
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    if (grid[row][col]) {
                        const x = col * BLOCK_SIZE;
                        const y = row * BLOCK_SIZE;
                        drawBlock(ctx, x, y, BLOCK_SIZE-1, bombGrid[row][col], freezeGrid[row][col], currentStyle);
                    }
                }
            }
            if (currentPiece && gameActive && !gameOver) {
                for (let r = 0; r < currentPiece.shape.length; r++) {
                    for (let c = 0; c < currentPiece.shape[0].length; c++) {
                        if (currentPiece.shape[r][c]) {
                            const x = (currentPiece.x + c) * BLOCK_SIZE;
                            const y = (currentPiece.y + r) * BLOCK_SIZE;
                            drawBlock(ctx, x, y, BLOCK_SIZE-1, currentPiece.isBomb, currentPiece.isFreeze, currentStyle);
                        }
                    }
                }
            }

            if (freezeActive) {
                ctx.fillStyle = 'rgba(100, 180, 255, 0.25)';
                ctx.fillRect(0, 0, 300, 600);
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 16px sans-serif';
                ctx.fillText(`❄️${freezeCount}`, 10, 40);
            }

            if (gameOver) {
                ctx.fillStyle = '#ffffff40';
                ctx.font = 'bold 30px sans-serif';
                ctx.fillText('GAME OVER', 20, 300);
            }
        }

        function drawNextBoard() {
            nextCtx.clearRect(0, 0, 120, 120);
            nextCtx.fillStyle = '#0f171f';
            nextCtx.fillRect(0, 0, 120, 120);
            if (nextPiece) {
                const shape = nextPiece.shape;
                const cols = shape[0].length;
                const rows = shape.length;
                const offsetX = (4 - cols) * PREVIEW_SIZE / 2;
                const offsetY = (4 - rows) * PREVIEW_SIZE / 2;
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (shape[r][c]) {
                            const x = offsetX + c * PREVIEW_SIZE;
                            const y = offsetY + r * PREVIEW_SIZE;
                            drawBlock(nextCtx, x, y, PREVIEW_SIZE-1, nextIsBomb, nextIsFreeze, currentStyle);
                        }
                    }
                }
            }
        }

        function updateScore() {
            scoreSpan.innerText = score;
            checkSpecialThreshold();
            adjustSpeedByMode();
        }

        function adjustSpeedByMode() {
            let newInterval = baseInterval;
            if (accelMode.checked) {
                // 渐快加速：每3000分速度增加一级 (间隔减小)
                let level = Math.floor(score / 3000) + 1;
                newInterval = Math.max(40, Math.floor(baseInterval / level));
            } else {
                newInterval = baseInterval;
            }
            currentInterval = newInterval;
            currentIntervalShow.innerText = currentInterval;
            restartGameLoop();
        }

        function restartGameLoop() {
            if (gameInterval) {
                clearInterval(gameInterval);
                gameInterval = null;
            }
            if (gameActive && !gameOver) {
                gameInterval = setInterval(() => {
                    if (gameActive && !gameOver) {
                        if (!freezeActive) {
                            movePiece(0, 1, false);
                        }
                    }
                }, currentInterval);
            }
        }

        function newGame() {
            initAudio();

            if (gameInterval) {
                clearInterval(gameInterval);
                gameInterval = null;
            }
            initGrid();
            score = 0;
            specialThreshold = 1000;
            nextSpecialType = 0;
            freezeActive = false;
            freezeCount = 0;
            gameActive = true;
            gameOver = false;

            nextPiece = null;
            generateNextPiece();
            spawnNewPiece();

            updateScore();
            adjustSpeedByMode();
            drawAll();

            gameCanvas.focus();
        }

        function onStartClick() {
            newGame();
            startGameBtn.innerText = '🔄 重新开始';
        }

        speedSlider.addEventListener('input', (e) => {
            baseInterval = parseInt(e.target.value);
            speedValue.innerText = baseInterval + 'ms';
            adjustSpeedByMode();
        });

        fixedMode.addEventListener('change', adjustSpeedByMode);
        accelMode.addEventListener('change', adjustSpeedByMode);

        styleSelect.addEventListener('change', (e) => {
            currentStyle = parseInt(e.target.value);
            drawAll();
        });

        startGameBtn.addEventListener('click', onStartClick);

        window.addEventListener('keydown', (e) => {
            if (!gameActive || gameOver) return;
            const key = e.key;
            if (key.startsWith('Arrow') || key === ' ') {
                e.preventDefault();
            }
            switch (key) {
                case 'ArrowLeft': movePiece(-1, 0, true); break;
                case 'ArrowRight': movePiece(1, 0, true); break;
                case 'ArrowDown': movePiece(0, 1, true); break;
                case 'ArrowUp': rotatePiece(); break;
                case ' ':
                    while (!collision(currentPiece.shape, currentPiece.x, currentPiece.y+1)) {
                        currentPiece.y++;
                    }
                    lockPiece();
                    drawAll();
                    break;
                default: break;
            }
        });

        // 初始状态
        initGrid();
        gameActive = false;
        gameOver = false;
        drawAll();
        nextCtx.clearRect(0, 0, 120, 120);
        nextCtx.fillStyle = '#0f171f';
        nextCtx.fillRect(0, 0, 120, 120);
        startGameBtn.innerText = '▶ 开始游戏';
        // 默认选中加速模式
        accelMode.checked = true;
        // 滑块默认500
        speedSlider.value = 500;
        speedValue.innerText = '500ms';
        currentIntervalShow.innerText = '500';
    })();
</script>
</body>
